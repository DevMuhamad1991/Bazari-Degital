<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kurd Account</title>

  <link rel="stylesheet" href="assect/css/sign.css" />
  <link rel="stylesheet" href="assets/css/style.css">

     <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700;900&family=Cairo:wght@300;400;600;700;900&family=Noto+Naskh+Arabic:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  
</head>
<body>
  
    <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="sign.html" class="logo">
        <span class="logo-icon"><i class="fa-solid fa-shield-halved"></i></span>
        <span class="logo-text">Kurd<span class="accent">Account</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="sign.html" class="nav-link">SignUp</a></li>
        <li><a href="market.html" class="nav-link">Market</a></li>
        <li><a href="post.html" class="nav-link">Seller</a></li>
        <li><a href="team.html" class="nav-link">AboutTeam</a></li>
        <li><a href="read.html" class="nav-link">Review</a></li>
        <li><a href="index.html" class="nav-link">Home</a></li>
      </ul>
    </div>
  </nav>

  <div class="page">

    <div class="grid-bg"></div>

    <div class="card">

      <div class="card-header">
        <div class="logo-text">
          <span class="logo-white">Kurd</span><span class="logo-blue">Account</span>
          <div class="logo-sub">SECURE ACCESS</div>
        </div>
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
      </div>

      <div class="tab-row">
        <button class="tab-btn" id="tab-register" onclick="showPanel('register')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        </button>
        <button class="tab-btn active" id="tab-login" onclick="showPanel('login')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        </button>
      </div>

      <div id="panel-login" class="panel active">
        <h2 class="panel-title">بەخێربێیتەوە</h2>
        <p class="panel-sub">بچۆ ژوورەوە بۆ بەردەوامی</p>

        <div class="field">
          <label>ئیمەیڵ</label>
          <div class="inp-wrap">
            <input type="email" id="loginEmail" placeholder="example@company.com" />
            <span class="inp-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
          </div>
        </div>

        <div class="field">
          <label>وشەی نهێنی</label>
          <div class="inp-wrap">
            <input type="password" id="loginPassword" placeholder="••••••••" />
            <span class="inp-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
          </div>
        </div>

        <button class="main-btn" id="loginBtn">
          چوونەژوورەوە
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        </button>
      </div>

      <div id="panel-register" class="panel">
        <h2 class="panel-title">تۆمارکردن</h2>
        <p class="panel-sub">هەژمارێکی نوێ دروست بکە</p>

        <div class="two-col">
          <div class="field">
            <label>ناوی یەکەم</label>
            <div class="inp-wrap">
              <input type="text" id="firstName" placeholder="ناوت" />
              <span class="inp-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
            </div>
          </div>
          <div class="field">
            <label>ناوی دووەم</label>
            <div class="inp-wrap">
              <input type="text" id="lastName" placeholder="کوڕناوت" />
              <span class="inp-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
            </div>
          </div>
        </div>

        <div class="field">
          <label>ئیمەیڵ</label>
          <div class="inp-wrap">
            <input type="email" id="registerEmail" placeholder="example@email.com" />
            <span class="inp-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
          </div>
        </div>

        <div class="field">
          <label>وشەی نهێنی</label>
          <div class="inp-wrap">
            <input type="password" id="registerPassword" placeholder="لانی کەم ٨ پیت" />
            <span class="inp-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
          </div>
        </div>

        <button class="main-btn" id="registerBtn">
          دروستکردنی هەژمار
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        </button>
      </div>

    </div>
  </div>

  <script type="module" src="assect/java/sign.js"></script>

</body>
</html>
