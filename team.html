<!DOCTYPE html>
<html lang="ku">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team Section — KurdAccount</title>
  
  <!-- =============================================
       [1] ── GOOGLE FONTS & EXTERNAL LIBRARIES ──
       ============================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,300&family=Playfair+Display:wght@700;800;900&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
  
  <!-- =============================================
       [2] ── MAIN TEAM PAGE CSS ──
       ============================================= -->
  <link rel="stylesheet" href="assect/css/team.css"/>
  
  <!-- =============================================
       [3] ── NAVBAR CSS (LOADED FROM EXTERNAL FILE) ──
       ============================================= -->
  <link rel="stylesheet" href="assect/navbar/nav.css"/>
</head>
<body>

  <!-- =============================================
       [4] ── NAVBAR PLACEHOLDER (CONTENT LOADED BY nav.js) ──
       ============================================= -->
  <div id="navbar-root"></div>

  <!-- =============================================
       [5] ── TEAM SECTION (MAIN CONTENT) ──
       ============================================= -->
  <section class="team-section" id="team">
    <div class="container">

      <div class="hero-eyebrow" data-aos="fade-down">
        <span class="eyebrow-dot"></span>
        <span>Web Dev</span>
        <span class="eyebrow-dot"></span>
      </div>

      <h2 class="section-title" data-aos="fade-down" data-aos-delay="80">
        Meet Our Professional Team
      </h2>

      <p class="section-subtitle" data-aos="fade-down" data-aos-delay="140">
        تیمێکی گەنجی پسپۆڕ کە هەموو ئەنرژی و زانیاریانیان دەخەنە خزمەتی سەرکەوتنی پرۆژەکانت
      </p>

      <div class="section-desc" data-aos="fade-down" data-aos-delay="180">
        ئێمە باور دەکەین کە دیجیتاڵ تەنها تێکنەلۆژیا نییە — بەڵکوو رووحی نوێ بووني کارە.
        هەر تیمێک لێرە بە وردەکاری هەڵبژێردراوە بۆ ئەوەی باشترین ئەنجامی بۆ کڕیار بهێنێتە دی.
      </div>

      <div class="team-grid">
        <!-- cards content... (هەر وەک خۆی) -->
      </div>

      <div class="stats-strip">
        <!-- stats content... (هەر وەک خۆی) -->
      </div>

      <div class="about-team">
        <!-- about content... (هەر وەک خۆی) -->
      </div>

    </div>
  </section>

  <!-- =============================================
       [6] ── TEAM PAGE CUSTOM JS ──
       ============================================= -->
  <script src="assect/java/team.js"></script>
  
  <!-- =============================================
       [7] ── NAVBAR JS (LOADS NAVBAR CONTENT) ──
       ============================================= -->
  <script src="assect/navbar/nav.js"></script>
</body>
</html>
