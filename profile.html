<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پرۆفایل — Kurd Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/navbar/nav.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assect/css/profile.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-icon"><i class="fa-solid fa-shield-halved"></i></span>
        <span class="logo-text">Kurd<span class="accent">Account</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="sign.html" class="nav-link">SignUp</a></li>
        <li><a href="market.html" class="nav-link">Market</a></li>
        <li><a href="post.html" class="nav-link">Seller</a></li>
        <li><a href="team.html" class="nav-link">AboutTeam</a></li>
        <li><a href="read.html" class="nav-link">Review</a></li>
        <li><a href="index.html" class="nav-link">Home</a></li>
      </ul>
    </div>
  </nav>

  <!-- PROFILE PAGE -->
  <div class="profile-page">

    <div class="profile-card">

      <!-- Avatar -->
      <div class="avatar-section">
        <div class="avatar-wrap">
          <img id="profileAvatar" src="" alt="پرۆفایل" />
          <label class="avatar-edit" for="avatarInput" title="گۆڕینی وێنە">
            <i class="fa-solid fa-camera"></i>
          </label>
          <input type="file" id="avatarInput" accept="image/*" hidden />
        </div>
        <div class="avatar-info">
          <h2 id="profileFullName">...</h2>
          <span id="profileUsername" class="username-badge">@...</span>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Info Fields -->
      <div class="profile-fields">

        <div class="field-group">
          <label><i class="fa-solid fa-envelope"></i> ئیمەیڵ</label>
          <div class="field-value" id="profileEmail">...</div>
        </div>

        <div class="field-group">
          <label><i class="fa-solid fa-at"></i> یوزەرنەیم</label>
          <div class="field-edit-row">
            <input type="text" id="usernameInput" placeholder="یوزەرنەیمەکەت بنووسە" />
            <button class="save-btn" id="saveUsernameBtn">
              <i class="fa-solid fa-check"></i>
            </button>
          </div>
        </div>

        <div class="field-group">
          <label><i class="fa-solid fa-user"></i> ناوی تەواو</label>
          <div class="field-edit-row">
            <input type="text" id="fullNameInput" placeholder="ناوی تەواوت بنووسە" />
            <button class="save-btn" id="saveNameBtn">
              <i class="fa-solid fa-check"></i>
            </button>
          </div>
        </div>

      </div>

      <div class="divider"></div>

      <!-- Logout -->
      <button class="logout-btn" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i>
        دەرچوون
      </button>

    </div>

  </div>

  <!-- Notification -->
  <div id="notifContainer"></div>

  <script type="module" src="assect/java/profile.js"></script>
</body>
</html>
